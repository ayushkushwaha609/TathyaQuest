services:
  - type: web
    name: tathya-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: tathya_db
